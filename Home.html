<!DOCTYPE html>
<html lang="en" data-theme="mono">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script>
(function () {
  if (!/[?&]r=/.test(location.search)) {
    location.replace(location.pathname + '?r=' + Date.now() + location.hash);
  } else {
    history.replaceState(null, '', location.pathname + location.hash);
  }
})();
</script>
<title>GameDeal — Now</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>document.write('<link rel="stylesheet" href="app/app.css?t=' + Date.now() + '">');</script>
<noscript><link rel="stylesheet" href="app/app.css"></noscript>
</head>
<body>

<header>
  <div class="hi">
    <a class="logo" href="#">Game<span>Deal</span></a>
    <div class="live-dot" id="liveDot" style="display:none"></div>
    <span class="live-label" id="liveLabel" style="display:none">LIVE</span>
    <span class="updated-at" id="updatedAt"></span>
    <div class="hs">
      <span class="si" data-icon="search"></span>
      <input type="text" id="searchInput" data-i18n-ph="search_ph" autocomplete="off">
      <button class="search-go" id="searchBtn" onclick="doSearch()" data-i18n="search_btn">Search</button>
    </div>
    <div class="hr">
      <button class="filter-btn" id="filterBtn" onclick="toggleSidebarMobile()"><span data-icon="filter"></span> <span data-i18n="filter">Filters</span></button>
      <button class="refresh-btn" id="refreshBtn" onclick="hardReload()"><span data-icon="refresh"></span> <span data-i18n="refresh">Refresh</span></button>
      <div class="lp">
        <button class="lb" data-l="en">EN</button>
        <button class="lb" data-l="th">ไทย</button>
        <button class="lb" data-l="zh">中文</button>
      </div>
      <div class="tp">
        <button class="tb on" data-t="mono" title="Mono"></button>
        <button class="tb" data-t="dark" title="Dark"></button>
        <button class="tb" data-t="steam" title="Steam"></button>
        <button class="tb" data-t="paper" title="Paper"></button>
      </div>
    </div>
  </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="fs">
      <div class="ft" data-i18n="budget_label">Budget</div>
      <div class="bwrap">
        <span>$</span>
        <input type="number" class="binp" id="sbBudget" min="0">
      </div>
      <div class="bres" id="sbRes"></div>
    </div>

    <div class="fs">
      <div class="ft" data-i18n="discount">Discount</div>
      <div class="dbtns">
        <button class="db on" data-disc="0" data-i18n="disc_all">All discounts</button>
        <button class="db" data-disc="50" data-i18n="disc_50">50%+ off</button>
        <button class="db" data-disc="70" data-i18n="disc_70">70%+ off</button>
        <button class="db" data-disc="90" data-i18n="disc_90">90%+ off</button>
      </div>
    </div>

    <div class="fs" id="genreSection">
      <div class="ft" data-i18n="genre_label">Genre</div>
      <div class="ggrid" id="genreFilter">
        <button class="gt on" data-g="" data-i18n="genre_all">All</button>
        <button class="gt" data-g="Action">Action</button>
        <button class="gt" data-g="Adventure">Adventure</button>
        <button class="gt" data-g="RPG">RPG</button>
        <button class="gt" data-g="Strategy">Strategy</button>
        <button class="gt" data-g="Simulation">Simulation</button>
        <button class="gt" data-g="Horror">Horror</button>
        <button class="gt" data-g="Indie">Indie</button>
        <button class="gt" data-g="Racing">Racing</button>
        <button class="gt" data-g="Sports">Sports</button>
      </div>
    </div>

    <div class="fs">
      <div class="ft" data-i18n="sort_label">Sort by</div>
      <div class="dd" id="sortDd"></div>
    </div>
  </aside>

  <main>
    <div class="stats">
      <div class="sc"><span class="sn" id="stTotal">—</span><div class="sl" data-i18n="stat_total">On sale</div></div>
      <div class="sc"><span class="sn" id="stMax">—</span><div class="sl" data-i18n="stat_max">Max discount</div></div>
      <div class="sc"><span class="sn" id="stAvg">—</span><div class="sl" data-i18n="stat_avg">Avg discount</div></div>
      <div class="sc"><span class="sn" id="stFree">—</span><div class="sl" data-i18n="stat_free">Free games</div></div>
    </div>

    <div class="switch-row">
      <div class="source-switch" id="sourceSwitch"></div>
      <div class="cur-wrap" id="currencyWrap"></div>
    </div>

    <div class="bp">
      <div class="bpt"><span data-icon="gamepad"></span> <span data-i18n="budget_q">What can this budget buy?</span></div>
      <div class="brow">
        <input type="number" id="budgetIn" data-i18n-ph="budget_ph" min="0">
        <button onclick="calcBudget()" data-i18n="budget_find">Find</button>
      </div>
      <div class="bout" id="budgetOut"></div>
    </div>

    <div class="tabs">
      <button class="tab on" data-tab="sale" onclick="switchTab('sale')"><span data-icon="zap"></span> <span data-i18n="tab_sale">On Sale</span></button>
      <button class="tab" data-tab="free" onclick="switchTab('free')"><span data-icon="gift"></span> <span data-i18n="tab_free">Free</span></button>
      <button class="tab" data-tab="dlc" onclick="switchTab('dlc')"><span data-icon="puzzle"></span> <span data-i18n="tab_dlc">DLC</span></button>
      <button class="tab" data-tab="wish" onclick="switchTab('wish')"><span data-icon="heart"></span> <span data-i18n="tab_wish">Wishlist</span></button>
    </div>

    <div class="sh">
      <span class="st" id="secTitle"></span>
      <span class="rc" id="rcCount"></span>
    </div>

    <div class="gg" id="gameGrid"></div>
    <div id="sentinel"></div>
    <div class="lmi" id="lmi" data-i18n="loading">Loading...</div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  var t = Date.now();
  ['config.js', 'app/i18n.js', 'sources/steam.js', 'sources/cheapshark.js', 'app/main.js'].forEach(function (src) {
    document.write('<script src="' + src + '?t=' + t + '"><\/script>');
  });
})();
</script>
</body>
</html>
